[autoexec]
remount C Y
SUBST C: Y:\Ameri3x
imgmount -u d
c: 
path=C:\;z:\;c:\windows\ 
:menu
@echo off
cls
echo.
echo Press 1 for American Civil War: From Sumter to Appomattox
echo Press 2 for Fateful Lightning: A Narrative History of the Civil War
echo Press 3 to Quit
echo.
choice /C:123 /N Please Choose:

if errorlevel = 3 goto quit
if errorlevel = 2 goto bio2
if errorlevel = 1 goto bio1

:bio1
imgmount d c:\cd\amer1997.cue -t cdrom 
c:
@cd I-Magic\civilwar
cls
win acwiii
goto exit

:bio2
imgmount d c:\cd\amer1997.iso -t cdrom
d:
cls
@win civilwar.exe
goto exit

:quit
exit
