[autoexec]
remount C Y
SUBST C: Y:\STKling
c: 
path=C:\;z:\;c:\windows\ 
call run:menu
@echo off
echo This game spans 2 CDs
echo When prompted use :
echo - HK + LeftStick Up to eject current disc,
echo - HK + LeftStick Right/Left to change discs,
echo - HK + LeftStick Up to load the selected disc.
echo.
pause
cls
echo.
echo Press 1 for Star Trek Klingon: Immersion Studies
echo Press 2 for Star Trek Klingon: Language Lab
echo Press 3 to Quit
echo.
echo Once in windows, press Ctrl-F4 to switch CDs when prompted.
echo.
choice /C:123 /N Please Choose:

if errorlevel = 3 goto quit
if errorlevel = 2 goto epi2
if errorlevel = 1 goto epi1

:epi1
imgmount d c:\cd\klingon1.cue c:\cd\klingon2.cue -t cdrom 
cls
cd klingon
win runexit KLINGON
imgmount -u d
cd ..
goto menu

:epi2
imgmount d c:\cd\klingon3.cue -t cdrom 
cls
cd klingon
win runexit langlab
imgmount -u d
cd ..
goto menu

:quit
exit
