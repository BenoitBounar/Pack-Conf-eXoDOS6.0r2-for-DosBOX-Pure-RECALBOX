[sdl]
fullscreen=true
fulldouble=false
fullresolution=desktop
windowresolution=800x600
output=texture
renderer=auto
vsync=false
autolock=true
sensitivity=100
waitonerror=true
priority=higher,normal
mapperfile=mapper-0.74.map
usescancodes=true
[dosbox]
language=
machine=svga_s3
captures=capture
memsize=32
[render]
frameskip=0
aspect=true
scaler=normal2x
[cpu]
core=auto
cputype=auto
cycles=75000
cycleup=10
cycledown=20
[mixer]
nosound=false
rate=44100
blocksize=1024
prebuffer=20
[midi]
mpu401=intelligent
mididevice=default
midiconfig=
[sblaster]
sbtype=sb16
sbbase=220
irq=7
dma=1
hdma=5
sbmixer=true
oplmode=auto
oplemu=default
oplrate=44100
[gus]
gus=false
gusrate=44100
gusbase=240
gusirq=5
gusdma=3
ultradir=C:\ULTRASND
[speaker]
pcspeaker=true
pcrate=44100
tandy=auto
tandyrate=44100
disney=true
[joystick]
joysticktype=auto
timed=true
autofire=false
swap34=false
buttonwrap=false
[serial]
serial1=dummy
serial2=dummy
serial3=disabled
serial4=disabled
[dos]
xms=true
ems=true
umb=true
keyboardlayout=auto
[ipx]
ipx=false
[autoexec]
remount C Y
SUBST C: Y:\Civ2Gold
c: 
path=C:\;z:\;c:\windows\ 
:menu
@echo off
cls
echo.
echo Press 1 for Sid Meier's Civilization II
echo Press 2 for Sid Meier's Civilization II: Conflicts in Civilization
echo Press 3 for Sid Meier's Civilization II: Fantastic Worlds
echo Press 4 to Quit
echo.
echo Note: When using one of the two scenario packs above, you will need to choose
echo "Begin Scenario" from the main menu and then navigate to the scenario subfolder
echo to choose the one you wish to load.
echo.
choice /C:1234 /N Please Choose:

if errorlevel = 4 goto quit
if errorlevel = 3 goto CIV2FW
if errorlevel = 2 goto CIV2CC
if errorlevel = 1 goto CIV2

:CIV2
imgmount d c:\cd\cd.cue -t cdrom 
@cd mps/civ2
cls
@win runexit civ2
goto menu

:CIV2CC
imgmount d c:\cd\civ2s.cue -t cdrom
@cd mps/civ2cc
cls
@win runexit civ2
goto menu

:CIV2FW
imgmount d c:\cd\civfw.cue -t cdrom
@cd mps/civ2fw
cls
@win runexit civ2
goto menu

:quit
exit
