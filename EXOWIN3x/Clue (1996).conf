[autoexec]
remount C Y
SUBST C: Y:\Clue
c: 
path=C:\;z:\;c:\windows\;c:\games\clue
:menu
@echo off
cls
echo.
echo Press 1 for Clue: Blackmail
echo Press 2 for Clue: Road to Damascus
echo Press 3 for Clue: Deadly Patent
echo Press 4 to Quit
echo.
echo Once you have exited the game, press Ctrl-F9 to exit Windows.
echo.
choice /C:1234 /N Please Choose:

if errorlevel = 4 goto quit
if errorlevel = 3 goto bio3
if errorlevel = 2 goto bio2
if errorlevel = 1 goto bio1

:bio1
@imgmount d "c:\cd\Blackmail.cue" -t cdrom 
cd games\clue
cls
win winclue.exe -dD: -s3
goto quit

:bio2
@imgmount d "c:\cd\Damascus.cue" -t cdrom 
cd games\clue
cls
win winclue.exe -dD: -s5
goto quit

:bio3
@imgmount d "c:\cd\Deadly_Patent.cue" -t cdrom 
cd games\clue
cls
win winclue.exe -dD: -s2
goto quit

:quit
exit
