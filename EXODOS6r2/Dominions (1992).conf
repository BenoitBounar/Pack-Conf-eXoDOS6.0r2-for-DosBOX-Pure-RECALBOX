SUBST C: Y:\dom_door
c:
@echo off
:menu
cls
echo.
echo Press 1 to Play Dominions v1.6
echo Press 2 to Play Dominions II v2.0
echo Press 3 to Run the v1.6 Reset Utility
echo Press 4 to Run the v2.0 Reset Utility
echo Press 5 to Exit
echo.
choice /C:12345 /N Please Choose:

IF ERRORLEVEL = 5 GOTO LEAVE
IF ERRORLEVEL = 4 GOTO config20
IF ERRORLEVEL = 3 GOTO config16
IF ERRORLEVEL = 2 GOTO 20
IF ERRORLEVEL = 1 GOTO 16

:config16
@cd 1.6
RESETDOM
cd ..
goto menu

:config20
cd 2.0\domin2
cls
echo.
@RESETDOM
cd ..
cd ..
goto menu

:16
cd 1.6
@DOMINION C:\2.0\DOMIN2\chain.txt
cd ..
goto leave

:20
cd 2.0
@call DOMIN2
cd ..
goto leave

:leave
